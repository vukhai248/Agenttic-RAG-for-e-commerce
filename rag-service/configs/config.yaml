chunking:
  chunk_size: 1000
  chunk_overlap: 200

retrieval:
  k: 5
  graph_max_hops: 2 # number of traversal hops for graph retrieval
  rrf_k: 60 # smoothing constant for Reciprocal Rank Fusion

generation:
  temperature: 1.0
  max_tokens: 4096
  top_p: 1.0
  reasoning_effort: HIGH # default/none for qwen 3.6 27b; low/medium/high for gpt oss 120b
  stream: True
  stop: 



# Catalog cấu hình chi tiết cho từng Model của mỗi nhà cung cấp

llm:
  google:
    available:
      - "gemini-3.1-flash-lite"
      - "gemma-4-26b-a4b-it"
    
  groq:
    available:
      - "qwen/qwen3.6-27b"
      - "openai/gpt-oss-120b"
      - "openai/gpt-oss-20b"

  openrouter:
    available:
      - "google/gemini-2.5-flash"
      - "meta-llama/llama-3.3-70b-instruct:free"
      - "qwen/qwen3-235b-a22b:free"


  # Cấu hình chỉ định model đang chạy thực tế cho từng tác vụ
  # Chỉ cần thay đổi 'provider' và 'model_key' ở đây để benchmark
  router:
    provider: "groq"
    model_key: "qwen3_6_27b"

  qa:
    provider: "groq"
    model_key: "gpt_oss_20b"

embedding:
  available:
    - "nvidia/llama-nemotron-embed-vl-1b-v2:free"  # Vision-Language, 2048 dims, đang dùng
    - "text-embedding-3-small"                       # OpenAI, 1536 dims
    - "intfloat/multilingual-e5-large"               # Offline local, 1024 dims
  active: "nvidia/llama-nemotron-embed-vl-1b-v2:free"  # Model đang dùng thực tế
